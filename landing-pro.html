<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNZ - Your Page. Your Vibe. Your Stage.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', 'Arial', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.08;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #0066FF, transparent);
            top: -200px;
            left: -200px;
            animation: float 25s infinite ease-in-out;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00D9FF, transparent);
            bottom: -150px;
            right: -150px;
            animation: float 30s infinite ease-in-out reverse;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #0066FF, transparent);
            top: 50%;
            right: -100px;
            animation: float 35s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(40px, -40px);
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 900px;
            width: 90%;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo section */
        .logo-section {
            margin-bottom: 60px;
            animation: slideDown 1.2s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-banner {
            width: 100%;
            max-width: 700px;
            height: auto;
            margin: 0 auto;
            filter: drop-shadow(0 0 30px rgba(0, 217, 255, 0.3)) drop-shadow(0 0 60px rgba(0, 102, 255, 0.2));
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% {
                filter: drop-shadow(0 0 30px rgba(0, 217, 255, 0.3)) drop-shadow(0 0 60px rgba(0, 102, 255, 0.2));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(0, 217, 255, 0.4)) drop-shadow(0 0 80px rgba(0, 102, 255, 0.3));
            }
        }

        /* CTA Button */
        .cta-button {
            margin-top: 80px;
            animation: slideUp 1.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-enter {
            padding: 18px 60px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 2px solid #00D9FF;
            background: transparent;
            color: #00D9FF;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2), inset 0 0 20px rgba(0, 217, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .btn-enter::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 110, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-enter:hover::before {
            left: 100%;
        }

        .btn-enter:hover {
            background: rgba(0, 217, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.5), inset 0 0 20px rgba(0, 217, 255, 0.1);
            transform: translateY(-3px);
        }

        .btn-enter:active {
            transform: translateY(-1px);
        }

        .btn-enter-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .arrow {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .btn-enter:hover .arrow {
            transform: translateX(5px);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            color: #666;
            z-index: 1;
            font-style: italic;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                width: 95%;
            }

            .logo-banner {
                max-width: 500px;
            }

            .btn-enter {
                padding: 14px 40px;
                font-size: 14px;
                letter-spacing: 2px;
            }

            .cta-button {
                margin-top: 50px;
            }
        }

        @media (max-width: 480px) {
            .logo-section {
                margin-bottom: 40px;
            }

            .logo-banner {
                max-width: 350px;
            }

            .btn-enter {
                padding: 12px 30px;
                font-size: 12px;
                letter-spacing: 1px;
            }

            .btn-enter-text {
                gap: 8px;
            }

            .cta-button {
                margin-top: 40px;
            }

            .footer {
                font-size: 11px;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <!-- Main content -->
    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <img src="SKYNZlogobanner.png" alt="SKYNZ Logo" class="logo-banner">
        </div>

        <!-- CTA Button -->
        <div class="cta-button">
            <button class="btn-enter" onclick="window.location.href='platform.html'">
                <span class="btn-enter-text">
                    ENTER SKYNZ
                    <span class="arrow">→</span>
                </span>
            </button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Still writing code after 8 months 🚀
    </div>
</body>
</html>
